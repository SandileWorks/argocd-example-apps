apiVersion: batch/v1
kind: Job
metadata:
  name: db-check-job
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-check
          image: busybox:latest
          command:
            - "sh"
            - "-c"
            - "echo 'Running db check to $DB_HOST...' ; sleep 5 ; echo 'Db check completed.'"
          env:
            - name: DB_HOST
              valuefrom:
                configMapKeyRef:
                  name: db-config
                  key: host"