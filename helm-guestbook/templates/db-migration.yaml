apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-job
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-migration
          image: busybox:latest
          command:
            - "sh"
            - "-c"
            - "echo 'Running db migration...' ; sleep 5 ; echo 'Db migration completed.'"